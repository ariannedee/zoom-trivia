{% extends 'games/round_base.html' %}

{% block class %}round-start{% endblock %}

{% block content %}
  <h2>Round {{ round.number }}</h2>
  <h1>{{ round.name }}</h1>
  {% if round.description %}
    <h3>{{ round.description }}</h3>
  {% endif %}

  <a class="button primary align-self-end" href="{% url 'games:question' round.game.id round.number 1 %}">Start</a>
{% endblock content %}
