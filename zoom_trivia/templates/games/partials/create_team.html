<h3>Join a team:</h3>
<table>
  {% for team in game.teams.all %}
    <tr>
      <td>{{ team.name }}</td>
      <td class="align-right">
        <a class="button" href="{% url 'teams:join_team' game.id team.id %}">Join team</a>
      </td>
    </tr>
  {% endfor %}
</table>
<h3>OR</h3>
<form method="post" action="{% url 'teams:create_team' game.id %}">
  {% csrf_token %}
  <div class="flex">
    <label for="team_name">Create a new team:</label>
    <input type="text" id="id-team-name" name="team_name" placeholder="Team name"/>
    <input type="submit" value="Create team"/>
  </div>
</form>
